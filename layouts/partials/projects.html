<section id="projects" class="section bg-gray-50">
    <div class="max-w-4xl mx-auto">
        <h2 class="section-title">Projects</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            {{ range .Site.Data.projects }}
            <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                <img src="{{ .image }}" alt="{{ .title }}" class="w-full h-48 object-cover">
                <div class="p-6">
                    <h3 class="text-xl font-semibold text-primary mb-2">{{ .title }}</h3>
                    <p class="text-secondary mb-4">{{ .description }}</p>
                    <div class="flex space-x-4">
                        <a href="{{ .github }}" class="text-primary hover:underline">GitHub</a>
                        {{ if .demo }}
                        <a href="{{ .demo }}" class="text-primary hover:underline">Live Demo</a>
                        {{ end }}
                    </div>
                </div>
            </div>
            {{ end }}
        </div>
    </div>
</section>
