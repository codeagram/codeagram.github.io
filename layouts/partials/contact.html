<section id="contact" class="section bg-white">
    <div class="max-w-4xl mx-auto text-center">
        <h2 class="section-title">Get In Touch</h2>
        <p class="text-secondary mb-8">
            I'm currently open for opportunities. Feel free to reach out!
        </p>
        <a href="mailto:{{ .Site.Params.email }}"
            class="inline-block bg-primary text-white px-8 py-3 rounded-lg hover:bg-opacity-90 transition-colors">
            Send Email
        </a>
        <div class="mt-8 flex justify-center space-x-6">
            <a href="{{ .Site.Params.github }}" class="text-secondary hover:text-primary">GitHub</a>
            <a href="{{ .Site.Params.linkedin }}" class="text-secondary hover:text-primary">LinkedIn</a>
        </div>
    </div>
</section>
