<section id="hero" class="section flex items-center justify-center bg-gray-50">
    <div class="max-w-4xl mx-auto text-center">
        <h1 class="text-5xl font-bold text-primary mb-4">
            {{ .Site.Params.name }}
        </h1>
        <h2 class="text-2xl text-secondary mb-8">
            {{ .Site.Params.role }}
        </h2>
        <div class="flex justify-center space-x-4">
            <a href="{{ .Site.Params.github }}" class="text-secondary hover:text-primary">
                <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                    <!-- GitHub SVG path -->
                </svg>
            </a>
            <a href="{{ .Site.Params.linkedin }}" class="text-secondary hover:text-primary">
                <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                    <!-- LinkedIn SVG path -->
                </svg>
            </a>
        </div>
    </div>
</section>
